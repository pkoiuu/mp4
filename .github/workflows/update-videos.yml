# GitHub Action: 自动迁移大视频到 Releases + 生成视频清单
# 功能描述:
#   1. 扫描 videos-pending/ 目录,把大视频迁移到 GitHub Releases 并从仓库删除
#   2. 扫描 videos/ 目录 + Releases,合并生成 videos.json 清单
# 触发条件: push 到 main(videos 或 videos-pending 目录变化)、Release 事件、手动触发
name: Update Video Manifest

on:
  push:
    branches: [main]
    paths:
      - 'videos/**'
      - 'videos-pending/**'
      - 'scripts/**'
      - '.github/workflows/update-videos.yml'
  release:
    types: [published, unpublished, edited, deleted]
  workflow_dispatch:

# 需要 write 权限以便提交清单和创建 Release
permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码,fetch-depth: 0 以获取完整 git 历史
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 配置 Node.js(Node 20 自带全局 fetch)
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 迁移大视频:扫描 videos-pending/,迁移到 Releases 并从仓库删除
      - name: 迁移大视频到 Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/migrate-large-videos.js

      # 4. 生成视频清单(扫描 videos/ 目录 + Releases)
      - name: 生成视频清单
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/generate-manifest.js

      # 5. 提交所有变更(迁移删除 + 清单更新)一次性推送
      - name: 提交并推送变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "无变更,跳过提交"
            exit 0
          fi
          git commit -m "chore: 自动更新视频清单和迁移大视频 [skip ci]"
          # 尝试推送,最多重试 3 次
          for i in 1 2 3; do
            echo "--- 推送尝试 $i/3 ---"
            if git push origin main; then
              echo "✓ 推送成功"
              exit 0
            fi
            echo "推送失败,拉取远程变更并 rebase..."
            git fetch origin main
            # 如果 rebase 有冲突,用 theirs 策略自动解决(优先保留远程的清单之外的文件)
            if ! git rebase origin/main; then
              echo "rebase 冲突,中止并使用 merge 策略..."
              git rebase --abort
              git merge origin/main --no-edit -X theirs || true
            fi
          done
          # 最后一次尝试
          git push origin main || echo "⚠ 推送最终失败,但迁移已完成,下次 Action 会重试"
