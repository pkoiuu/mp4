# GitHub Action: 自动迁移大视频到 Releases + 生成视频清单
# 功能描述:
#   1. 扫描 videos-pending/ 目录,把大视频迁移到 GitHub Releases 并从仓库删除
#   2. 扫描 videos/ 目录 + Releases,合并生成 videos.json 清单
# 触发条件: push 到 main(videos 或 videos-pending 目录变化)、Release 事件、手动触发
name: Update Video Manifest

on:
  push:
    branches: [main]
    paths:
      - 'videos/**'
      - 'videos-pending/**'
      - 'scripts/**'
      - '.github/workflows/update-videos.yml'
  release:
    types: [published, unpublished, edited, deleted]
  workflow_dispatch:

# 需要 write 权限以便提交清单和创建 Release
permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码,fetch-depth: 0 以获取完整 git 历史
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 配置 Node.js(Node 20 自带全局 fetch)
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 迁移大视频:扫描 videos-pending/,迁移到 Releases 并从仓库删除
      - name: 迁移大视频到 Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/migrate-large-videos.js

      # 4. 提交迁移产生的删除变更(如果有)
      - name: 提交迁移变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "无迁移变更,跳过提交"
          else
            git commit -m "chore: 迁移大视频到 Releases [skip ci]"
            git push
            echo "✓ 迁移变更已提交"
          fi

      # 5. 生成视频清单(扫描 videos/ 目录 + Releases)
      - name: 生成视频清单
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/generate-manifest.js

      # 6. 提交并推送清单变更
      - name: 提交清单变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos.json
          if git diff --cached --quiet; then
            echo "清单无变化,跳过提交"
          else
            git commit -m "chore: 自动更新视频清单 [skip ci]"
            git push
            echo "✓ 清单已提交"
          fi
