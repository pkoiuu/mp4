<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>视频仓库</title>
  <meta name="description" content="基于 GitHub 仓库的视频托管与可视化" />
  <link rel="stylesheet" href="style.css" />
  <script src="config.js"></script>
</head>
<body>
  <!-- 顶部站点头 -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <h1 id="siteTitle">视频仓库</h1>
        <p id="siteSubtitle">基于 GitHub 的视频托管与可视化</p>
      </div>
      <div class="stats" id="stats" hidden>
        <span id="statCount">0</span> 个视频 ·
        共 <span id="statSize">0</span>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- 工具栏:搜索与排序 -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5L20.49 19zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14"/>
        </svg>
        <input type="search" id="searchInput" placeholder="搜索视频名称..." class="search-input" autocomplete="off" />
      </div>
      <select id="sortSelect" class="sort-select" aria-label="排序方式">
        <option value="name">按名称 A→Z</option>
        <option value="-size">按大小 大→小</option>
        <option value="size">按大小 小→大</option>
        <option value="-date" selected>按时间 新→旧</option>
        <option value="date">按时间 旧→新</option>
      </select>
    </div>

    <!-- 视频网格 -->
    <div id="videoGrid" class="video-grid" aria-live="polite"></div>

    <!-- 空状态 -->
    <div id="emptyState" class="empty-state" hidden>
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" width="56" height="56" aria-hidden="true">
          <path fill="currentColor" d="M4 6h16v10H4zm0-2a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zM2 20h20v2H2z"/>
        </svg>
      </div>
      <p class="empty-title">暂无视频</p>
      <p class="empty-hint">把 MP4 文件放入 <code>videos/</code> 目录并推送<br />GitHub Action 会自动更新清单</p>
    </div>

    <!-- 加载状态 -->
    <div id="loadingState" class="loading-state">
      <div class="spinner"></div>
      <p>加载视频中...</p>
    </div>

    <!-- 分页 -->
    <div id="pagination" class="pagination" hidden></div>
  </main>

  <!-- 播放模态框 -->
  <div id="playerModal" class="modal" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content" role="dialog" aria-modal="true" aria-label="视频播放">
      <button class="modal-close" id="modalClose" aria-label="关闭">&times;</button>
      <video id="modalVideo" controls playsinline></video>
      <div class="modal-info">
        <h3 id="modalTitle"></h3>
        <div class="modal-meta" id="modalMeta"></div>
        <div class="link-group" id="modalLinks"></div>
      </div>
    </div>
  </div>

  <!-- 复制提示 -->
  <div id="toast" class="toast" hidden></div>

  <footer class="site-footer">
    <p>视频通过 GitHub 仓库托管 · 直链由 jsDelivr CDN 加速 · 大文件走 Releases</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
